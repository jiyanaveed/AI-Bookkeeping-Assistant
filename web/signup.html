<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up — UK AI Accountant</title>
  <link rel="stylesheet" href="/internal/css/base.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-brand">
      <strong>UK AI Accountant</strong>
      <span>Create your account</span>
    </div>
    <nav class="nav-cluster">
      <a class="nav-item" href="/internal/index.html">Home</a>
      <a class="nav-item" href="/internal/login.html">Log in</a>
    </nav>
  </header>

  <div class="page-wrap" style="max-width:420px;margin:2rem auto">
    <h1 class="page-title">Sign up</h1>
    <p class="page-sub">You will continue to business setup after registering.</p>

    <form id="form" class="surface surface-pad">
      <div id="err" class="alert-inline alert-error hidden" role="alert"></div>
      <label class="field-label">Full name (optional)
        <input type="text" id="full_name" autocomplete="name" />
      </label>
      <label class="field-label">Email
        <input type="email" id="email" required autocomplete="email" />
      </label>
      <label class="field-label">Password (min 8 characters)
        <input type="password" id="password" required minlength="8" autocomplete="new-password" />
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem">Continue to setup</button>
    </form>
  </div>

  <script type="module">
    import { apiUrl } from "/internal/js/api.js";
    import { setSession } from "/internal/js/gate.js";

    const err = document.getElementById("err");
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.add("hidden");
      const body = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        full_name: document.getElementById("full_name").value.trim() || null,
      };
      try {
        const r = await fetch(apiUrl("/v1/auth/register"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const t = await r.text();
        if (!r.ok) throw new Error(t || r.status);
        const data = JSON.parse(t);
        setSession(data);
        window.location.href = "/internal/onboarding.html";
      } catch (x) {
        err.textContent = x.message || String(x);
        err.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
